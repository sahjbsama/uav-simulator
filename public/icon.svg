<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#00060e"/>
  <!-- Hexagon frame -->
  <polygon points="256,40 430,145 430,367 256,472 82,367 82,145"
    fill="none" stroke="#00ff99" stroke-width="18"/>
  <!-- 4 rotor circles -->
  <circle cx="160" cy="160" r="55" fill="none" stroke="#00ff99" stroke-width="10"/>
  <circle cx="352" cy="160" r="55" fill="none" stroke="#00ff99" stroke-width="10"/>
  <circle cx="160" cy="352" r="55" fill="none" stroke="#00ff99" stroke-width="10"/>
  <circle cx="352" cy="352" r="55" fill="none" stroke="#00ff99" stroke-width="10"/>
  <!-- Center body -->
  <rect x="218" y="218" width="76" height="76" rx="8" fill="#00ff99"/>
  <!-- Arms -->
  <line x1="218" y1="218" x2="160" y2="160" stroke="#00ff99" stroke-width="12"/>
  <line x1="294" y1="218" x2="352" y2="160" stroke="#00ff99" stroke-width="12"/>
  <line x1="218" y1="294" x2="160" y2="352" stroke="#00ff99" stroke-width="12"/>
  <line x1="294" y1="294" x2="352" y2="352" stroke="#00ff99" stroke-width="12"/>
</svg>
